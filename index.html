<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#101010" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="689 Cats" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="./manifest.json" />
  <title>689 Cats Companion</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#101010;color:#f6efe3;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .app{max-width:760px;margin:auto;padding:22px 16px 92px}
    .brand{display:flex;gap:14px;align-items:center;margin:10px 0 22px}
    .logo{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,#d8bd7a,#8f6a2a);display:grid;place-items:center;color:#111;font-weight:900}
    h1{font-size:38px;margin:0} h2{margin:4px 0 10px;font-size:25px} h3{margin:0 0 8px}
    .muted{color:#b6aa96}.gold{color:#d8bd7a}
    .kicker{text-transform:uppercase;letter-spacing:.14em;font-size:12px;color:#d8bd7a;font-weight:800;margin:0 0 8px}
    .card{background:rgba(255,255,255,.06);border:1px solid rgba(216,189,122,.25);border-radius:28px;padding:20px;margin:14px 0;box-shadow:0 18px 40px rgba(0,0,0,.24)}
    .hero{background:linear-gradient(145deg,rgba(216,189,122,.23),rgba(255,255,255,.04));display:flex;justify-content:space-between;gap:18px}
    .day{width:92px;height:92px;border-radius:50%;background:#d8bd7a;color:#111;display:flex;align-items:center;justify-content:center;flex-direction:column;flex-shrink:0}.day strong{font-size:36px}
    input{width:100%;border:1px solid rgba(216,189,122,.35);border-radius:16px;background:rgba(255,255,255,.08);color:#f6efe3;padding:13px;margin:6px 0 12px;font:inherit}
    button{border:0;background:#d8bd7a;color:#111;border-radius:16px;padding:13px 16px;font-weight:800;font:inherit}
    button.secondary{background:rgba(255,255,255,.08);color:#f6efe3;border:1px solid rgba(216,189,122,.25)}
    .row{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:14px;border:1px solid rgba(255,255,255,.08);border-radius:18px;background:rgba(255,255,255,.04);margin:10px 0}
    .nav{position:fixed;left:12px;right:12px;bottom:12px;max-width:760px;margin:auto;background:rgba(20,20,20,.94);border:1px solid rgba(216,189,122,.35);border-radius:24px;padding:10px;display:flex;justify-content:space-around}
    .nav button{background:transparent;color:#f6efe3;padding:8px;font-size:12px}.login{max-width:460px;margin:70px auto}.warn{border-color:#b94c3e}
  </style>
</head>
<body>
<div id="root">Lädt...</div>

<script src="./config.js"></script>
<script type="module">
  import React, {useEffect, useState} from 'https://esm.sh/react@18.3.1'
  import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client'
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4'

  const supabaseUrl = window.CATS_SUPABASE_URL
  const supabaseKey = window.CATS_SUPABASE_ANON_KEY
  const configured = supabaseUrl && supabaseKey && !supabaseUrl.includes('DEIN-PROJEKT') && !supabaseKey.includes('DEIN_ANON')
  const supabase = configured ? createClient(supabaseUrl, supabaseKey) : null

  const plan = [
    {day:0,title:'Deckung dokumentieren',text:'Deckdatum, Deckkater, Anzahl Deckakte und Verhalten festhalten.'},
    {day:2,title:'Rolligkeit kontrollieren',text:'Prüfen, ob Rufen und Paarungsstellung abgeklungen sind.'},
    {day:7,title:'Gewicht erfassen',text:'Startgewicht dokumentieren und wöchentliche Kontrolle beginnen.'},
    {day:21,title:'Ultraschall planen',text:'Zwischen Tag 21 und 25 ist Ultraschall sinnvoll.'},
    {day:42,title:'Wurfzimmer vorbereiten',text:'Wurfbox, Waage, Tücher und Notfallnummern bereitlegen.'},
    {day:60,title:'Endphase',text:'Mehrmals täglich beobachten.'},
    {day:63,title:'Geburtsterminfenster',text:'Ab jetzt jederzeit mit der Geburt rechnen.'}
  ]

  const today=()=>new Date().toISOString().slice(0,10)
  const add=(iso,d)=>{let x=new Date(iso+'T12:00:00');x.setDate(x.getDate()+d);return x.toISOString().slice(0,10)}
  const diff=(a,b)=>Math.floor((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/86400000)
  const pretty=iso=>new Date(iso+'T12:00:00').toLocaleDateString('de-CH',{day:'2-digit',month:'2-digit',year:'numeric'})

  function App(){
    const [session,setSession]=useState(null),[email,setEmail]=useState(''),[loading,setLoading]=useState(true),[view,setView]=useState('home')
    const [cats,setCats]=useState([]),[mating,setMating]=useState(null),[preg,setPreg]=useState(null),[tasks,setTasks]=useState([]),[weight,setWeight]=useState('')

    useEffect(()=>{
      if(!supabase){setLoading(false);return}
      supabase.auth.getSession().then(({data})=>{setSession(data.session);setLoading(false)})
      const {data:s}=supabase.auth.onAuthStateChange((_e,x)=>setSession(x))
      return()=>s.subscription.unsubscribe()
    },[])
    useEffect(()=>{if(session)load()},[session])

    async function login(e){
      e.preventDefault()
      await supabase.auth.signInWithOtp({email})
      alert('Magic Link wurde gesendet. Öffne den Link im selben Safari-Browser.')
    }

    async function seed(){
      const uid=session.user.id
      const {data:ex}=await supabase.from('cats').select('id').eq('owner_id',uid).limit(1)
      if(ex?.length)return
      const {data:c}=await supabase.from('catteries').insert({owner_id:uid,name:'689 Cats',website:'https://www.689cats.ch'}).select().single()
      const {data:l}=await supabase.from('cats').insert({owner_id:uid,cattery_id:c.id,name:"Romida's Lillifee",call_name:'Lillifee',sex:'female',role:'queen',breed:'Maine Coon',color:'Silver Shaded',birth_date:'2024-11-04'}).select().single()
      const {data:n}=await supabase.from('cats').insert({owner_id:uid,cattery_id:c.id,name:"Country Gulliver's Nectarine",call_name:'Nectarine',sex:'male',role:'external',breed:'Maine Coon',color:'Red Silver Tabby'}).select().single()
      await supabase.from('cats').insert({owner_id:uid,cattery_id:c.id,name:'Bacari',call_name:'Bacari',sex:'male',role:'stud',breed:'Maine Coon'})
      const {data:m}=await supabase.from('matings').insert({owner_id:uid,cattery_id:c.id,queen_id:l.id,sire_id:n.id,title:'Lillifee × Nectarine',mating_date:'2026-06-28',status:'mated'}).select().single()
      const {data:p}=await supabase.from('pregnancies').insert({owner_id:uid,mating_id:m.id,start_date:'2026-06-28',status:'active'}).select().single()
      await supabase.from('tasks').insert(plan.map(x=>({owner_id:uid,pregnancy_id:p.id,title:x.title,description:x.text,due_date:add('2026-06-28',x.day),priority:x.day>=60?'high':'normal'})))
    }

    async function load(){
      try{
        await seed()
        const uid=session.user.id
        const [{data:cs},{data:ms},{data:ps},{data:ts}] = await Promise.all([
          supabase.from('cats').select('*').eq('owner_id',uid).order('created_at'),
          supabase.from('matings').select('*').eq('owner_id',uid).order('mating_date',{ascending:false}).limit(1),
          supabase.from('pregnancies').select('*').eq('owner_id',uid).order('created_at',{ascending:false}).limit(1),
          supabase.from('tasks').select('*').eq('owner_id',uid).order('due_date')
        ])
        setCats(cs||[]);setMating(ms?.[0]||null);setPreg(ps?.[0]||null);setTasks(ts||[])
      }catch(err){
        alert('Fehler beim Laden. Prüfe Supabase Schema und RLS: ' + err.message)
      }
    }

    async function addWeight(){
      if(!weight||!preg)return
      const l=cats.find(c=>c.call_name==='Lillifee')||cats[0]
      await supabase.from('weight_logs').insert({owner_id:session.user.id,cat_id:l.id,pregnancy_id:preg.id,log_date:today(),weight_kg:Number(weight)})
      setWeight('');load()
    }

    const day=preg?Math.max(0,diff(preg.start_date,today())):0
    const cur=[...plan].reverse().find(x=>x.day<=day)||plan[0]
    const open=tasks.filter(x=>x.status==='open').slice(0,4)

    if(loading)return <main className="app"><div className="card">Lädt...</div></main>
    if(!supabase)return <main className="app"><div className="card warn"><h1>Konfiguration fehlt</h1><p>Öffne config.js und trage Supabase URL und anon public key ein.</p></div></main>
    if(!session)return <main className="app login"><div className="brand"><div className="logo">689</div><div><h1>689 Cats</h1><p className="muted">Companion</p></div></div><form className="card" onSubmit={login}><p className="kicker">Login</p><h2>Willkommen</h2><input type="email" placeholder="E-Mail" value={email} onChange={e=>setEmail(e.target.value)} required/><button>Magic Link senden</button></form></main>

    return <main className="app">
      <div className="brand"><div className="logo">689</div><div><h1>689 Cats</h1><p className="muted">Static PWA · Foundation 0.1</p></div></div>
      {view==='home'&&<>
        <section className="card hero"><div><p className="kicker">Heute bei 689 Cats</p><h2>Lillifee · Tag {day}</h2><p>{cur.text}</p><p className="muted">{preg?`Geburtsterminfenster: ${pretty(preg.expected_from)} – ${pretty(preg.expected_to)}`:''}</p></div><div className="day"><strong>{day}</strong><span>Tag</span></div></section>
        <section className="card"><p className="kicker">Gewicht</p><input type="number" step="0.01" placeholder="kg" value={weight} onChange={e=>setWeight(e.target.value)}/><button onClick={addWeight}>Speichern</button></section>
        <section className="card"><p className="kicker">Offene Aufgaben</p>{open.map(x=><div className="row" key={x.id}><span>{x.title}<br/><small className="muted">{x.due_date?pretty(x.due_date):''}</small></span><button className="secondary" onClick={async()=>{await supabase.from('tasks').update({status:'done',completed_at:new Date().toISOString()}).eq('id',x.id);load()}}>Erledigt</button></div>)}</section>
      </>}
      {view==='cats'&&<section className="card"><p className="kicker">Katzen</p>{cats.map(c=><div className="row" key={c.id}><span><b>{c.call_name||c.name}</b><br/><small className="muted">{c.role} · {c.color||c.breed}</small></span></div>)}</section>}
      {view==='litters'&&<section className="card"><p className="kicker">Verpaarung</p><h2>{mating?.title||'Noch keine Verpaarung'}</h2><p>Deckdatum: {mating?.mating_date?pretty(mating.mating_date):'-'}</p><p className="muted">Deckkater ist pro Verpaarung frei wählbar.</p></section>}
      {view==='family'&&<section className="card"><p className="kicker">689 Family</p><h2>Käufer und Community</h2><p className="muted">Warteliste, WhatsApp-Einwilligungen und Käuferbetreuung werden hier verwaltet.</p></section>}
      {view==='more'&&<section className="card"><p className="kicker">Mehr</p><button className="secondary" onClick={()=>supabase.auth.signOut()}>Logout</button></section>}
      <nav className="nav"><button onClick={()=>setView('home')}>Home</button><button onClick={()=>setView('cats')}>Katzen</button><button onClick={()=>setView('litters')}>Zucht</button><button onClick={()=>setView('family')}>Family</button><button onClick={()=>setView('more')}>Mehr</button></nav>
    </main>
  }

  createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
</html>
