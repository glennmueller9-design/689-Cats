<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#101010" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="689 Cats" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="./manifest.json" />
<title>689 Cats Companion</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#101010;color:#f6efe3;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{max-width:760px;margin:auto;padding:22px 16px 90px}.brand{display:flex;gap:14px;align-items:center;margin:10px 0 22px}.logo{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,#d8bd7a,#8f6a2a);display:grid;place-items:center;color:#111;font-weight:900}h1{font-size:38px;margin:0}h2{margin:4px 0 10px;font-size:25px}.muted{color:#b6aa96}.kicker{text-transform:uppercase;letter-spacing:.14em;font-size:12px;color:#d8bd7a;font-weight:800;margin:0 0 8px}.card{background:rgba(255,255,255,.06);border:1px solid rgba(216,189,122,.25);border-radius:28px;padding:20px;margin:14px 0;box-shadow:0 18px 40px rgba(0,0,0,.24)}.hero{background:linear-gradient(145deg,rgba(216,189,122,.23),rgba(255,255,255,.04));display:flex;justify-content:space-between;gap:18px}.day{width:92px;height:92px;border-radius:50%;background:#d8bd7a;color:#111;display:flex;align-items:center;justify-content:center;flex-direction:column;flex-shrink:0}.day strong{font-size:36px}input{width:100%;border:1px solid rgba(216,189,122,.35);border-radius:16px;background:rgba(255,255,255,.08);color:#f6efe3;padding:13px;margin:6px 0 12px;font:inherit}button{border:0;background:#d8bd7a;color:#111;border-radius:16px;padding:13px 16px;font-weight:800;font:inherit}button.secondary{background:rgba(255,255,255,.08);color:#f6efe3;border:1px solid rgba(216,189,122,.25)}.row{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:14px;border:1px solid rgba(255,255,255,.08);border-radius:18px;background:rgba(255,255,255,.04);margin:10px 0}.nav{position:fixed;left:12px;right:12px;bottom:12px;max-width:760px;margin:auto;background:rgba(20,20,20,.94);border:1px solid rgba(216,189,122,.35);border-radius:24px;padding:10px;display:flex;justify-content:space-around}.nav button{background:transparent;color:#f6efe3;padding:8px;font-size:12px}.login{max-width:460px;margin:70px auto}.warn{border-color:#b94c3e}
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4'
const SUPABASE_URL = globalThis.VITE_SUPABASE_URL || '%%VITE_SUPABASE_URL%%'
const SUPABASE_ANON_KEY = globalThis.VITE_SUPABASE_ANON_KEY || '%%VITE_SUPABASE_ANON_KEY%%'
const supabase = (!SUPABASE_URL.includes('%%') && !SUPABASE_ANON_KEY.includes('%%')) ? createClient(SUPABASE_URL,SUPABASE_ANON_KEY) : null
const plan=[{day:0,title:'Deckung dokumentieren',text:'Deckdatum, Deckkater, Anzahl Deckakte und Verhalten festhalten.'},{day:2,title:'Rolligkeit kontrollieren',text:'Prüfen, ob Rufen und Paarungsstellung abgeklungen sind.'},{day:7,title:'Gewicht erfassen',text:'Startgewicht dokumentieren und wöchentliche Kontrolle beginnen.'},{day:21,title:'Ultraschall planen',text:'Zwischen Tag 21 und 25 ist Ultraschall sinnvoll.'},{day:42,title:'Wurfzimmer vorbereiten',text:'Wurfbox, Waage, Tücher und Notfallnummern bereitlegen.'},{day:60,title:'Endphase',text:'Mehrmals täglich beobachten.'},{day:63,title:'Geburtsterminfenster',text:'Ab jetzt jederzeit mit der Geburt rechnen.'}]
const root=document.getElementById('root');let session=null,cats=[],mating=null,preg=null,tasks=[],view='home';
const today=()=>new Date().toISOString().slice(0,10);const add=(iso,d)=>{let x=new Date(iso+'T12:00:00');x.setDate(x.getDate()+d);return x.toISOString().slice(0,10)};const diff=(a,b)=>Math.floor((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/86400000);const pretty=iso=>new Date(iso+'T12:00:00').toLocaleDateString('de-CH',{day:'2-digit',month:'2-digit',year:'numeric'});
function html(s){root.innerHTML=s}
async function init(){if(!supabase){html('<main class="app"><div class="card warn"><h1>Supabase fehlt</h1><p>In dieser No-src-Version müssen Supabase URL und anon key direkt in index.html ersetzt werden.</p></div></main>');return}const {data}=await supabase.auth.getSession();session=data.session;if(!session)return renderLogin();await load();render()}
function renderLogin(){html(`<main class="app login"><div class="brand"><div class="logo">689</div><div><h1>689 Cats</h1><p class="muted">Companion</p></div></div><form class="card" id="login"><p class="kicker">Login</p><h2>Willkommen</h2><input type="email" id="email" placeholder="E-Mail" required><button>Magic Link senden</button></form></main>`);document.getElementById('login').onsubmit=async e=>{e.preventDefault();await supabase.auth.signInWithOtp({email:document.getElementById('email').value});alert('Magic Link wurde gesendet.')}}
async function seed(){const uid=session.user.id;const {data:ex}=await supabase.from('cats').select('id').eq('owner_id',uid).limit(1);if(ex?.length)return;const{data:c}=await supabase.from('catteries').insert({owner_id:uid,name:'689 Cats',website:'https://www.689cats.ch'}).select().single();const{data:l}=await supabase.from('cats').insert({owner_id:uid,cattery_id:c.id,name:"Romida's Lillifee",call_name:'Lillifee',sex:'female',role:'queen',breed:'Maine Coon',color:'Silver Shaded',birth_date:'2024-11-04'}).select().single();const{data:n}=await supabase.from('cats').insert({owner_id:uid,cattery_id:c.id,name:"Country Gulliver's Nectarine",call_name:'Nectarine',sex:'male',role:'external',breed:'Maine Coon',color:'Red Silver Tabby'}).select().single();await supabase.from('cats').insert({owner_id:uid,cattery_id:c.id,name:'Bacari',call_name:'Bacari',sex:'male',role:'stud',breed:'Maine Coon'});const{data:m}=await supabase.from('matings').insert({owner_id:uid,cattery_id:c.id,queen_id:l.id,sire_id:n.id,title:'Lillifee × Nectarine',mating_date:'2026-06-28',status:'mated'}).select().single();const{data:p}=await supabase.from('pregnancies').insert({owner_id:uid,mating_id:m.id,start_date:'2026-06-28',status:'active'}).select().single();await supabase.from('tasks').insert(plan.map(x=>({owner_id:uid,pregnancy_id:p.id,title:x.title,description:x.text,due_date:add('2026-06-28',x.day),priority:x.day>=60?'high':'normal'})))}
async function load(){await seed();const uid=session.user.id;const res=await Promise.all([supabase.from('cats').select('*').eq('owner_id',uid).order('created_at'),supabase.from('matings').select('*').eq('owner_id',uid).order('mating_date',{ascending:false}).limit(1),supabase.from('pregnancies').select('*').eq('owner_id',uid).order('created_at',{ascending:false}).limit(1),supabase.from('tasks').select('*').eq('owner_id',uid).order('due_date')]);cats=res[0].data||[];mating=res[1].data?.[0];preg=res[2].data?.[0];tasks=res[3].data||[]}
function render(){const day=preg?Math.max(0,diff(preg.start_date,today())):0;const cur=[...plan].reverse().find(x=>x.day<=day)||plan[0];const open=tasks.filter(x=>x.status==='open').slice(0,4);let content='';if(view==='home')content=`<section class="card hero"><div><p class="kicker">Heute bei 689 Cats</p><h2>Lillifee · Tag ${day}</h2><p>${cur.text}</p><p class="muted">${preg?`Geburtsterminfenster: ${pretty(preg.expected_from)} – ${pretty(preg.expected_to)}`:''}</p></div><div class="day"><strong>${day}</strong><span>Tag</span></div></section><section class="card"><p class="kicker">Gewicht</p><input type="number" step="0.01" id="weight" placeholder="kg"><button id="saveWeight">Speichern</button></section><section class="card"><p class="kicker">Offene Aufgaben</p>${open.map(x=>`<div class="row"><span>${x.title}<br><small class="muted">${x.due_date?pretty(x.due_date):''}</small></span><button class="secondary" data-task="${x.id}">Erledigt</button></div>`).join('')}</section>`;if(view==='cats')content=`<section class="card"><p class="kicker">Katzen</p>${cats.map(c=>`<div class="row"><span><b>${c.call_name||c.name}</b><br><small class="muted">${c.role} · ${c.color||c.breed}</small></span></div>`).join('')}</section>`;if(view==='litters')content=`<section class="card"><p class="kicker">Verpaarung</p><h2>${mating?.title||'Noch keine Verpaarung'}</h2><p>Deckdatum: ${mating?.mating_date?pretty(mating.mating_date):'-'}</p><p class="muted">Deckkater ist pro Verpaarung frei wählbar.</p></section>`;if(view==='family')content=`<section class="card"><p class="kicker">689 Family</p><h2>Käufer und Community</h2><p class="muted">Warteliste, WhatsApp-Einwilligungen und Käuferbetreuung werden hier verwaltet.</p></section>`;if(view==='more')content=`<section class="card"><p class="kicker">Mehr</p><button class="secondary" id="logout">Logout</button></section>`;html(`<main class="app"><div class="brand"><div class="logo">689</div><div><h1>689 Cats</h1><p class="muted">No-src PWA · Foundation 0.1</p></div></div>${content}<nav class="nav"><button data-view="home">Home</button><button data-view="cats">Katzen</button><button data-view="litters">Zucht</button><button data-view="family">Family</button><button data-view="more">Mehr</button></nav></main>`);document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{view=b.dataset.view;render()});document.querySelectorAll('[data-task]').forEach(b=>b.onclick=async()=>{await supabase.from('tasks').update({status:'done',completed_at:new Date().toISOString()}).eq('id',b.dataset.task);await load();render()});const sw=document.getElementById('saveWeight');if(sw)sw.onclick=async()=>{const val=document.getElementById('weight').value;if(!val||!preg)return;const l=cats.find(c=>c.call_name==='Lillifee')||cats[0];await supabase.from('weight_logs').insert({owner_id:session.user.id,cat_id:l.id,pregnancy_id:preg.id,log_date:today(),weight_kg:Number(val)});await load();render()};const lo=document.getElementById('logout');if(lo)lo.onclick=()=>supabase.auth.signOut().then(()=>location.reload())}
init();
</script>
</body>
</html>
